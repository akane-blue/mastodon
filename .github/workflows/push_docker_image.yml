name: Push our docker image
on:
  push:
    branches:
      - hota/**
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  push_to_hub:
    name: Push Docker image to Docker Registry
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      -
        name: Login to Docker Registry
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}
      -
        name: Checkout akane-blue/mastodon
        uses: actions/checkout@v2
        with:
          repository: akane-blue/mastodon
          path: mastodon
      -
        name: Get latest branch name
        id: branch_name
        run: |
          cd mastodon
          LATEST_BRANCH="$(git branch --sort=-committerdate | sed -n 1p | sed 's/* //g')"
          git switch ${LATEST_BRANCH}
          DOCKER_TAG="$(echo ${LATEST_BRANCH} | sed 's/hota\///g' | sed 's/testing\///g' | sed 's/-/_/g')"
          echo "::set-output name=docker_tag::${DOCKER_TAG}"
      -
        name: Build and push to Docker Registry
        uses: docker/build-push-action@v2
        with:
          context: mastodon
          push: true
          tags: ${{ secrets.REGISTRY_USERNAME }}/${{ secrets.REGISTRY_REPO }}:${{steps.branch_name.outputs.docker_tag}}
